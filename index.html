<!doctype html>

    <title>qath — Navigate with intelligence.</title>
    <meta name="theme-color" content="#fafafa" />
    <meta
      name="description"
      content="The path is already there, you just haven't found it yet. It's about knowing where to go next."
    />

    <!-- Open Graph -->

    <!-- Favicon -->

      href="https://fonts.googleapis.com/css2?family=Figtree:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ["Figtree", "sans-serif"],
              figtree: ["Figtree", "sans-serif"],
            },
            colors: {
              chalk: "#fafafa",
            },
          },
        },
      };
    </script>

    <!-- Custom CSS -->
    <style>
      .hero-glow {
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        width: min(115%, 820px);
        aspect-ratio: 1 / 1;
        z-index: -1;
        pointer-events: none;
        background: conic-gradient(
          from 210deg at 50% 50%,
          rgba(255, 107, 107, 0.22),
          rgba(77, 150, 255, 0.2),
          rgba(166, 108, 255, 0.2),
          rgba(255, 107, 107, 0.22)
        );
        -webkit-mask-image: radial-gradient(
          circle at 50% 50%,
          #000 0%,
          transparent 62%
        );
        mask-image: radial-gradient(
          circle at 50% 50%,
          #000 0%,
          transparent 62%
        );
        filter: blur(64px) saturate(1.1);
      }

      .intelligence {
        background: linear-gradient(
          90deg,
          #ff6b6b,
          #4d96ff,
          #a66cff,
          #ff6bd6,
          #ff6b6b
        );
        background-size: 300% auto;
        background-clip: text;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        color: transparent;
        animation: shimmer 6s linear infinite;
      }
      @keyframes shimmer {
        to {
          background-position: -300% center;
        }
      }
    </style>
  </head>
